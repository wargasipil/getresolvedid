<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F5F7FE"/>
  </linearGradient>
  <linearGradient id="ringIndigo" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#818CF8"/><stop offset="1" stop-color="#4338CA"/>
  </linearGradient>
  <linearGradient id="discIndigo" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#818CF8"/><stop offset="1" stop-color="#4338CA"/>
  </linearGradient>
  <linearGradient id="coreGreen" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#10B981"/>
  </linearGradient>
  <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#6366F1"/><stop offset="1" stop-color="#4338CA"/>
  </linearGradient>
  <radialGradient id="heroGlow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#EEF1FF"/><stop offset="0.7" stop-color="#F3F5FE"/><stop offset="1" stop-color="#F3F5FE" stop-opacity="0"/>
  </radialGradient>
  <filter id="chipShadow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#4338CA" flood-opacity="0.18"/>
  </filter>
  <filter id="ctaShadow" x="-40%" y="-40%" width="180%" height="200%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#4338CA" flood-opacity="0.35"/>
  </filter>
  <filter id="navShadow" x="-20%" y="-20%" width="140%" height="300%">
    <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
  </filter>
</defs>

<rect width="1440" height="900" fill="url(#bg)"/>

<!-- ambient blobs -->
<circle cx="1180" cy="120" r="220" fill="#EEF1FF" opacity="0.7"/>
<circle cx="120" cy="780" r="180" fill="#ECFDF5" opacity="0.6"/>

