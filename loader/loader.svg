<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="getresolved loading">
  <defs>
    <linearGradient id="grRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- faint full track ring -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="#4F46E5" stroke-opacity="0.14" stroke-width="9"/>

  <!-- spinning indigo arc (the working state). r=33 -> circumference ~207.3; dash 150 gap 57.3 -> ~72% arc -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="url(#grRing)" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="150 57.3" stroke-dashoffset="0"
          transform="rotate(-90 60 60)">
    <animateTransform attributeName="transform" type="rotate"
                      from="-90 60 60" to="270 60 60"
                      dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- green resolve core: pulses as the "resolved" beat -->
  <circle cx="60" cy="60" r="13" fill="url(#grCore)">
    <animate attributeName="r" values="9;13;9" keyTimes="0;0.5;1"
             dur="1.2s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"
             repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;1;0.65" keyTimes="0;0.5;1"
             dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
