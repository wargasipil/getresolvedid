<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="getresolved loading">
  <defs>
    <linearGradient id="grTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grTileCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- indigo app tile -->
  <rect width="120" height="120" rx="30" fill="url(#grTile)"/>

  <!-- faint white track -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="9"/>

  <!-- spinning white arc -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="#FFFFFF" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="150 57.3" stroke-dashoffset="0"
          transform="rotate(-90 60 60)">
    <animateTransform attributeName="transform" type="rotate"
                      from="-90 60 60" to="270 60 60"
                      dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- green resolve core -->
  <circle cx="60" cy="60" r="13" fill="url(#grTileCore)">
    <animate attributeName="r" values="9;13;9" keyTimes="0;0.5;1"
             dur="1.2s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"
             repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" keyTimes="0;0.5;1"
             dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
